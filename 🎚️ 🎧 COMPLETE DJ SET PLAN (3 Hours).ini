Cue A: Intro (0:00)

Cue B: First beat (~0:20–0:40)

Mix at low bass

👉 Transition: Long blend (16 bars)



-----------------------------------------------------------------------------------


🟡 00:30 – 01:15 (Build Energy)

Track Flow:

Harry Styles – Watermelon Sugar

Dua Lipa – Levitating

Justin Timberlake – Can’t Stop the Feeling

🎛️ Cue Points (Example: Levitating)

Cue A: Intro

Cue B: Pre-chorus (~0:45)

Cue C: Drop (~1:00)

👉 Transition:

Filter in → Drop at Cue C

Increase volume gradually

-----------------------------------------------------------------------------------



🎤 01:15 – 01:30 (Speech Window)

👉 Loop instrumental (8 beat loop)
👉 OR pause music completely

🎛️ Tip:

Use Echo Out FX before stopping

🟠 01:30 – 02:00 (Dance Floor Open)

